<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Posts</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/styles.css">
</head>
<body>
    <div class="container">
        <h1>📚 Blog Posts</h1>
        <div class="input-field">
            <input type="text" id="api-base-url" placeholder="Enter API Base URL" value="http://127.0.0.1:5002/api">
            <button onclick="loadPosts()">Load Posts</button>
        </div>
        <div class="input-field">
            <input type="text" id="post-title" placeholder="Enter Post Title">
            <input type="text" id="post-content" placeholder="Enter Post Content">
            <input type="text" id="post-author" placeholder="Enter Author Name">
            <button onclick="addPost()">Add Post</button>
        </div>
        <div class="input-field">
            <!-- Suche -->
            <div class="field">
                <label for="search-value">Search</label>
                <input type="text" id="search-value" placeholder="Search value">
            </div>

            <div class="field">
                <label for="search-field">Field</label>
                <select id="search-field">
                    <option value="title">Title</option>
                    <option value="content">Content</option>
                    <option value="author">Author</option>
                    <option value="tags">Tags</option>
                </select>
            </div>

            <!-- Sortierung -->
            <div class="field">
                <label for="sort-key">Sort</label>
                <select id="sort-key">
                    <option value="id">ID</option>
                    <option value="title">Title</option>
                    <option value="content">Content</option>
                    <option value="author">Author</option>
                    <option value="created_at">Created</option>
                    <option value="updated_at">Updated</option>
                    <option value="tags">Tags</option>
                </select>
                <select id="sort-order">
                    <option value="asc">ASC</option>
                    <option value="desc">DESC</option>
                </select>
            </div>
            <!-- Pagination -->
            <div class="field">
                <label for="page">Page</label>
                <input type="number" id="page" value="1" min="1">
            </div>

            <div class="field">
                <label for="page-size">Page Size</label>
                <input type="number" id="page-size" value="5" min="1">
            </div>

            <button onclick="loadPosts()">Apply</button>
        </div>
        <div id="post-container">
            <!-- Blog posts will be inserted here by JavaScript -->
        </div>
    </div>

    <script src="static/main.js"></script>
</body>
</html>
